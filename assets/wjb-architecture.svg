<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">

    <rect width="100%" height="100%" fill="#0f1117"/>

    <text x="600" y="60"
          font-size="36"
          text-anchor="middle"
          fill="#ffffff"
          font-family="Segoe UI, sans-serif">
        WJb — Minimal Job Execution Engine
    </text>

    <!-- WJb Core -->
    <rect x="100" y="140" width="250" height="200" rx="12" fill="none" stroke="#3fb950" stroke-width="2"/>
    <text x="225" y="180" text-anchor="middle" fill="#3fb950" font-size="22">WJb Core</text>

    <text x="120" y="210" fill="#c9d1d9" font-size="14">• Execution Engine</text>
    <text x="120" y="230" fill="#c9d1d9" font-size="14">• Actions &amp; Contracts</text>
    <text x="120" y="250" fill="#c9d1d9" font-size="14">• In-memory Store</text>
    <text x="120" y="270" fill="#c9d1d9" font-size="14">• Self-contained</text>

    <!-- WJb.Sql -->
    <rect x="475" y="140" width="250" height="200" rx="12" fill="none" stroke="#58a6ff" stroke-width="2"/>
    <text x="600" y="180" text-anchor="middle" fill="#58a6ff" font-size="22">WJb.Sql</text>

    <text x="495" y="210" fill="#c9d1d9" font-size="14">• SQL Storage</text>
    <text x="495" y="230" fill="#c9d1d9" font-size="14">• Persistence Layer</text>
    <text x="495" y="250" fill="#c9d1d9" font-size="14">• Store implementation</text>
    <text x="495" y="270" fill="#c9d1d9" font-size="14">• Uses WJb.Core</text>

    <!-- WJb.Pro -->
    <rect x="850" y="140" width="250" height="200" rx="12" fill="none" stroke="#ffa657" stroke-width="2"/>
    <text x="975" y="180" text-anchor="middle" fill="#ffa657" font-size="22">WJb.Pro</text>

    <text x="870" y="210" fill="#c9d1d9" font-size="14">• Hosting (ASP.NET Core)</text>
    <text x="870" y="230" fill="#c9d1d9" font-size="14">• Workers &amp; scaling</text>
    <text x="870" y="250" fill="#c9d1d9" font-size="14">• Cron scheduler</text>
    <text x="870" y="270" fill="#c9d1d9" font-size="14">• Advanced features</text>

    <!-- Arrows -->
    <line x1="350" y1="220" x2="475" y2="220" stroke="#c9d1d9" stroke-width="2"/>
    <polygon points="475,220 465,215 465,225" fill="#c9d1d9"/>

    <line x1="725" y1="220" x2="850" y2="220" stroke="#c9d1d9" stroke-width="2"/>
    <polygon points="850,220 840,215 840,225" fill="#c9d1d9"/>

    <!-- Flow -->
    <text x="600" y="440"
          text-anchor="middle"
          fill="#ffffff"
          font-size="20"
          font-family="Segoe UI, sans-serif">
        Job → Executor → Action → Result → Commands
    </text>

</svg>
